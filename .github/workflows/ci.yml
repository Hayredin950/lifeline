name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql, redis, gd
          tools: composer

      - name: Syntax check all PHP files
        run: |
          find lifeline/ worker/ setup_admin.php -name "*.php" \
            | xargs -P4 -I{} php -l {} \
            | grep -v "^No syntax errors" && exit 1 || exit 0

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql, redis, gd
          tools: composer

      - name: Install PHPStan
        run: composer require --dev phpstan/phpstan --no-interaction --quiet

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --configuration=phpstan.neon --no-progress

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect dangerous function calls
        run: |
          # Fail if eval() or shell_exec() appear in app code (not in comments/tests)
          if grep -rn --include="*.php" \
              -E '\beval\s*\(|\bshell_exec\s*\(|\bexec\s*\(|\bpassthru\s*\(|\bproc_open\s*\(' \
              lifeline/ worker/ setup_admin.php \
              | grep -v '^\s*//' \
              | grep -v 'run_forecast\.php'; then
            echo "::error::Dangerous function call detected"
            exit 1
          fi
          echo "Security scan passed"

      - name: Check for hardcoded secrets
        run: |
          # Look for patterns that suggest hardcoded passwords/keys in PHP files
          if grep -rn --include="*.php" \
              -E "(password|secret|api_key)\s*=\s*['\"][^'\"]{8,}" \
              lifeline/ worker/ setup_admin.php \
              | grep -v '\.env\|Config::get\|placeholder\|your_\|example\|test_\|CHANGE_ME'; then
            echo "::warning::Possible hardcoded secret detected — review above"
          fi
          echo "Secret scan done"

  migration-check:
    name: Migration integrity
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: lifeline_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql

      - name: Run all migrations
        run: |
          for f in $(ls schema/*.sql | sort); do
            echo "Applying $f..."
            mysql -h 127.0.0.1 -u root -prootpass lifeline_test < "$f"
          done
          echo "All migrations applied cleanly"
